<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portal Login</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <h1 class="login-title">EduPortal Login</h1>
      <div class="login-toggle">
        <button class="toggle-btn" onclick="switchTab('login')" id="tabLogin">Sign In</button>
        <button class="toggle-btn" onclick="switchTab('register')" id="tabRegister">Register</button>
      </div>
      <div class="role-switch">
        <label><input type="radio" name="role" value="admin" onclick="switchRole('admin')" checked> Administrator</label>
        <label><input type="radio" name="role" value="student" onclick="switchRole('student')"> Student</label>
      </div>
      <form id="loginForm" class="form-section">
        <h2 id="loginTitle">Administrator Sign In</h2>
        <div class="form-group">
          <label for="loginUser">Username</label>
          <input type="text" id="loginUser" placeholder="Enter username" autocomplete="username">
        </div>
        <div class="form-group">
          <label for="loginPass">Password</label>
          <input type="password" id="loginPass" placeholder="Enter password" autocomplete="current-password">
        </div>
        <div class="form-group remember">
          <input type="checkbox" id="rememberMe">
          <label for="rememberMe">Remember me</label>
        </div>
        <button type="button" class="action-btn" onclick="login()">Sign In</button>
        <p id="loginMsg" class="form-msg"></p>
      </form>
      <form id="registerForm" class="form-section" style="display:none">
        <h2 id="registerTitle">Register Administrator Account</h2>
        <div class="form-group">
          <label for="regName">Full Name</label>
          <input type="text" id="regName" placeholder="Your full name" autocomplete="name">
        </div>
        <div class="form-group">
          <label for="regUser">Username</label>
          <input type="text" id="regUser" placeholder="Choose a username" autocomplete="username">
        </div>
        <div class="form-group">
          <label for="regPass">Password</label>
          <input type="password" id="regPass" placeholder="Choose a password" autocomplete="new-password">
        </div>
        <div class="form-group" id="accessCodeField">
          <label for="regCode">Admin Access Code</label>
          <input type="password" id="regCode" placeholder="Enter admin access code">
        </div>
        <div id="studentExtraFields" style="display:none">
          <div class="form-group">
            <label for="regStudentId">Student ID</label>
            <input type="text" id="regStudentId" placeholder="e.g. STU-2024-001">
          </div>
          <div class="form-group">
            <label for="regYear">Year Level</label>
            <select id="regYear">
              <option value="">Select year level</option>
              <option>1st Year</option>
              <option>2nd Year</option>
              <option>3rd Year</option>
              <option>4th Year</option>
            </select>
          </div>
        </div>
        <button type="button" class="action-btn" onclick="register()">Create Account</button>
        <p id="registerMsg" class="form-msg"></p>
      </form>
    </div>
  </div>
  <script>
      const ADMIN_ACCESS_CODE = "ADMIN2024";
    let currentRole = "admin";
    function switchRole(role) {
      currentRole = role;
      document.getElementById("loginTitle").textContent =
        role === "admin" ? "Administrator Sign In" : "Student Sign In";
      document.getElementById("registerTitle").textContent =
        role === "admin" ? "Register Administrator Account" : "Register Student Account";
      document.getElementById("accessCodeField").style.display =
        role === "admin" ? "block" : "none";
      document.getElementById("studentExtraFields").style.display =
        role === "student" ? "block" : "none";
    }

    function switchTab(tab) {
      document.getElementById("loginForm").style.display = tab === "login" ? "block" : "none";
      document.getElementById("registerForm").style.display = tab === "register" ? "block" : "none";
    }

    function register() {
      const name = document.getElementById("regName").value.trim();
      const user = document.getElementById("regUser").value.trim();
      const pass = document.getElementById("regPass").value;

      if (!name || !user || !pass) {
        document.getElementById("registerMsg").textContent = "Please fill in all required fields.";
        return;
      }

      if (currentRole === "admin") {
        const code = document.getElementById("regCode").value;
        if (code !== ADMIN_ACCESS_CODE) {
          document.getElementById("registerMsg").textContent = "Invalid admin access code.";
          return;
        }
        if (localStorage.getItem("admin_" + user)) {
          document.getElementById("registerMsg").textContent = "Username already taken.";
          return;
        }
        localStorage.setItem("admin_" + user, JSON.stringify({ name, username: user, password: pass, role: "admin" }));

      } else {
        const studentId = document.getElementById("regStudentId").value.trim();
        const year = document.getElementById("regYear").value;
        if (!studentId || !year) {
          document.getElementById("registerMsg").textContent = "Please fill in all fields.";
          return;
        }
        if (localStorage.getItem("student_" + user)) {
          document.getElementById("registerMsg").textContent = "Username already taken.";
          return;
        }
        localStorage.setItem("student_" + user, JSON.stringify({ name, username: user, password: pass, role: "student", studentId, year }));
      }

      localStorage.setItem("savedUsername", user);
      localStorage.setItem("savedPassword", pass);
      localStorage.setItem("savedRole", currentRole);
      document.getElementById("registerMsg").textContent = "Account created! You can now sign in.";
    }

    function login() {
      const user = document.getElementById("loginUser").value.trim();
      const pass = document.getElementById("loginPass").value;
      const stored = localStorage.getItem(currentRole + "_" + user);

      if (!stored) {
        document.getElementById("loginMsg").textContent = "Account not found.";
        return;
      }

      const data = JSON.parse(stored);
      if (data.password !== pass) {
        document.getElementById("loginMsg").textContent = "Incorrect password.";
        return;
      }

      const rememberMe = document.getElementById("rememberMe")?.checked;
      if (rememberMe) {
        localStorage.setItem("savedUsername", user);
        localStorage.setItem("savedPassword", pass);
        localStorage.setItem("savedRole", currentRole);
      } else {
        localStorage.removeItem("savedUsername");
        localStorage.removeItem("savedPassword");
        localStorage.removeItem("savedRole");
      }
      localStorage.setItem("session", JSON.stringify({ key: currentRole + "_" + user, role: currentRole }));
      window.location.href = "dashboard.html";
    }

    function showDashboard(data) {
      document.getElementById("loginForm").style.display = "none";
      document.getElementById("registerForm").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
      document.getElementById("dashName").textContent = data.name;
      document.getElementById("dashRole").textContent = data.role === "admin" ? "Administrator" : "Student";
      document.getElementById("dashExtra").textContent =
        data.role === "student" ? "Student ID: " + data.studentId + " | Year: " + data.year : "";
    }

    function logout() {
      localStorage.removeItem("session");
      document.getElementById("dashboard").style.display = "none";
      document.getElementById("loginForm").style.display = "block";
      document.getElementById("loginMsg").textContent = "";
    }

    window.addEventListener("DOMContentLoaded", () => {
      const session = localStorage.getItem("session");
      if (session) {
        const s = JSON.parse(session);
        const stored = localStorage.getItem(s.key);
        if (stored) {
          window.location.href = "dashboard.html";
          return;
        }
      }

      const savedRole = localStorage.getItem("savedRole");
      const savedUsername = localStorage.getItem("savedUsername");
      const savedPassword = localStorage.getItem("savedPassword");
      if (savedRole) {
        switchRole(savedRole);
        document.querySelector(`input[name='role'][value='${savedRole}']`)?.checked = true;
      }
      if (savedUsername) document.getElementById("loginUser").value = savedUsername;
      if (savedPassword) document.getElementById("loginPass").value = savedPassword;
      if (savedUsername || savedPassword) document.getElementById("rememberMe").checked = true;
    });
  </script>
</body>
</html>
